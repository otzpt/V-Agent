name: Release

# Builds V-Agent for Windows and Linux on GitHub runners and attaches the
# archives to a GitHub Release. Triggered by a version tag (v1.0.0) or manually.
#
# macOS is intentionally out of scope for now. Windows and Linux cover the
# current users; macOS can be added back later (it needs a Mac runner and
# signing setup). Tags with a suffix (v1.0.0-ci1) build without publishing, so
# the workflow can be exercised safely.
#
# Artifacts are UNSIGNED; the OS may warn about an unknown publisher on first run.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
    steps:
      # Zed's git dependencies have paths longer than the Windows 260-char
      # default; without this, cargo fails while fetching them.
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Linux: the exact dependency set from Zed's script/linux (fontconfig,
      # freetype, alsa, libgit2, va, glib, xcb, wayland, vulkan, ...).
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfontconfig-dev libfreetype6-dev \
            libgit2-dev libva-dev libglib2.0-dev \
            libvulkan1 libwayland-dev libx11-xcb-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libzstd-dev libsqlite3-dev libssl-dev \
            make cmake clang lld llvm build-essential \
            curl git jq gettext-base elfutils \
            musl-tools musl-dev pipewire xdg-desktop-portal \
            pkg-config libstdc++-12-dev

      # Windows: point the icon-embedding build script at the SDK's rc.exe.
      - name: Locate Windows SDK rc.exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
                 Where-Object { Test-Path (Join-Path $_.FullName "x64\rc.exe") } |
                 Sort-Object Name -Descending | Select-Object -First 1
          if ($sdk) {
            "ZED_RC_TOOLKIT_PATH=$(Join-Path $sdk.FullName 'x64')" | Out-File $env:GITHUB_ENV -Append
          } else { Write-Warning "rc.exe not found" }

      # On failure, surface only the error-bearing lines as ::error::
      # annotations (readable without repo-admin log access).
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          # webrtc-sys (pulled in by LiveKit, for the collaboration feature we
          # disable) is old C++ that newer GCC rejects. -fpermissive downgrades
          # those errors to warnings so it still builds. Linux/GCC only.
          if [ "$RUNNER_OS" = "Linux" ]; then
            export CXXFLAGS="${CXXFLAGS:-} -fpermissive"
          fi
          if ! cargo build --release --target ${{ matrix.target }} --bin v-agent 2>&1 | tee build.log; then
            echo "----- error lines -----"
            grep -iE "error(\[|:|s)|cannot find|failed to|undefined|not found|fatal|panicked|no space" build.log | tail -20 || tail -20 build.log
            grep -iE "error(\[|:|s)|cannot find|failed to|undefined|not found|fatal|panicked|no space" build.log | tail -20 | sed 's/^/::error::/'
            exit 1
          fi

      # ---- Package -----------------------------------------------------------
      - name: Package Windows (portable zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rel = "target/${{ matrix.target }}/release"
          $out = "V-Agent-windows-x86_64"
          New-Item -ItemType Directory -Force $out | Out-Null
          Copy-Item "$rel/v-agent.exe" $out
          foreach ($f in @("conpty.dll","OpenConsole.exe")) {
            if (Test-Path "$rel/$f") { Copy-Item "$rel/$f" $out }
          }
          Compress-Archive -Path "$out/*" -DestinationPath "$out.zip" -Force

      - name: Package Windows (MSI)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet tool install --global wix 2>&1 | Out-Null
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          pwsh packaging/windows/build-msi.ps1 `
            -TargetDir (Resolve-Path "target/${{ matrix.target }}").Path `
            -OutFile "$PWD/V-Agent-x64.msi"

      - name: Package Linux (tar.gz)
        if: runner.os == 'Linux'
        run: |
          rel="target/${{ matrix.target }}/release"
          out="V-Agent-linux-x86_64"
          mkdir -p "$out"
          cp "$rel/v-agent" "$out/"
          tar -czf "$out.tar.gz" "$out"

      - name: Package Linux (.deb)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          rel="target/${{ matrix.target }}/release"
          pkg=deb/v-agent
          mkdir -p "$pkg/DEBIAN" "$pkg/usr/bin" "$pkg/usr/share/applications"
          cp "$rel/v-agent" "$pkg/usr/bin/v-agent"
          cat > "$pkg/DEBIAN/control" <<EOF
          Package: v-agent
          Version: 1.0.0
          Architecture: amd64
          Maintainer: V-Agent <v-agent@noreply.invalid>
          Description: A native, GPU-accelerated code editor with local-first AI.
          EOF
          cat > "$pkg/usr/share/applications/v-agent.desktop" <<EOF
          [Desktop Entry]
          Name=V-Agent
          Exec=/usr/bin/v-agent %U
          Type=Application
          Categories=Development;TextEditor;
          Terminal=false
          EOF
          dpkg-deb --build --root-owner-group "$pkg" "V-Agent-amd64.deb"

      - name: Package Linux (AppImage)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          rel="target/${{ matrix.target }}/release"
          APPDIR=V-Agent.AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp "$rel/v-agent" "$APPDIR/usr/bin/v-agent"
          cat > "$APPDIR/v-agent.desktop" <<EOF
          [Desktop Entry]
          Name=V-Agent
          Exec=v-agent
          Icon=v-agent
          Type=Application
          Categories=Development;
          EOF
          cp crates/zed/resources/app-icon.png "$APPDIR/v-agent.png" || touch "$APPDIR/v-agent.png"
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/v-agent" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$APPDIR" "V-Agent-x86_64.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: V-Agent-${{ matrix.name }}
          path: |
            V-Agent-windows-x86_64.zip
            V-Agent-x64.msi
            V-Agent-linux-x86_64.tar.gz
            V-Agent-amd64.deb
            V-Agent-x86_64.AppImage
          if-no-files-found: warn

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Publish only for clean version tags (v1.2.3). Suffixed tags (-ci1) build
    # but do not publish; manual runs never publish.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            V-Agent release — Windows and Linux builds.

            **Windows:** `.msi` installer, or the portable `.zip`.
            **Linux:** `.deb`, `.AppImage`, or the portable `.tar.gz`.

            Unsigned: on first launch the OS may warn about an unknown
            publisher (Windows: *More info → Run anyway*).
