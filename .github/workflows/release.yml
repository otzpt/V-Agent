name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SIDECAR_NAME: vagent-sidecar

jobs:
  # ── Per-platform build ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows
          - platform: ubuntu-latest
            artifact: linux
          - platform: macos-latest
            artifact: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────────────
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # ── Node 20 ─────────────────────────────────────────────────────
      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Python 3.11 ─────────────────────────────────────────────────
      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller requests python-dotenv

      # ── Linux system dependencies (WebKit / Tauri) ──────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── WiX Toolset (Windows MSI) ────────────────────────────────────
      - name: Install WiX Toolset
        if: matrix.platform == 'windows-latest'
        run: choco install wixtoolset --yes

      # ── Rust host triple (needed for sidecar filename) ────────────────
      - name: Get Rust target triple
        id: triple
        shell: bash
        run: |
          TRIPLE=$(rustc --version --verbose | grep "^host:" | awk '{print $2}')
          echo "value=$TRIPLE" >> "$GITHUB_OUTPUT"

      # ── Build Python sidecar ──────────────────────────────────────────
      - name: Build sidecar
        shell: bash
        working-directory: sidecar
        run: pyinstaller --onefile vagent_sidecar.py --name vagent_sidecar

      # ── Copy sidecar to src-tauri/binaries/ ──────────────────────────
      - name: Install sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "sidecar/dist/vagent_sidecar.exe" \
             "src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ steps.triple.outputs.value }}.exe"

      - name: Install sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p src-tauri/binaries
          cp "sidecar/dist/vagent_sidecar" \
             "src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ steps.triple.outputs.value }}"
          chmod +x \
             "src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ steps.triple.outputs.value }}"

      # ── Frontend ──────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Tauri build ───────────────────────────────────────────────────
      - name: Build Tauri app
        run: npm run tauri build

      # ── Windows portable ZIP (exe + sidecar, sem instalação) ─────────
      - name: Create Windows portable ZIP
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p portable
          cp src-tauri/target/release/v-agent.exe portable/V-Agent.exe
          cp "src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ steps.triple.outputs.value }}.exe" \
             "portable/${{ env.SIDECAR_NAME }}-${{ steps.triple.outputs.value }}.exe"
          7z a "V-Agent-${TAG}-windows-portable.zip" "./portable/*"

      # ── Upload artifacts ──────────────────────────────────────────────
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            V-Agent-*-windows-portable.zip

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: warn
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ── GitHub Release ────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          FILES=$(find release-artifacts -type f | tr '\n' ' ')

          cat > /tmp/release_notes.md << EOF
          ## V-Agent ${TAG}

          ### Downloads
          | Platform | File | Type |
          |----------|------|------|
          | Windows  | \`.msi\` | Installer (recommended) |
          | Windows  | \`-windows-portable.zip\` | Portable — extract and run, no install needed |
          | Windows  | \`-setup.exe\` | NSIS alternative installer |
          | Linux    | \`.deb\` | Installer (Ubuntu/Debian) |
          | Linux    | \`.AppImage\` | Universal portable |
          | macOS    | \`.dmg\` | Installer |

          > **Windows Portable**: extract the ZIP to any folder or USB drive and run \`V-Agent.exe\` directly. Requires WebView2 (present on Windows 10/11 with Edge).

          > **First launch**: V-Agent will prompt you to configure your AI provider and Hackatime (optional).

          Built automatically from tag \`${TAG}\`.
          EOF

          # Idempotent: re-pushing an existing tag updates the release in place
          # (refresh notes + clobber assets) instead of failing on "already exists".
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "V-Agent $TAG" \
              --notes-file /tmp/release_notes.md
            gh release upload "$TAG" $FILES --clobber
          else
            gh release create "$TAG" \
              --title "V-Agent $TAG" \
              --notes-file /tmp/release_notes.md \
              $FILES
          fi
