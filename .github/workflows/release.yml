      # 6. Detect Rust host target triple (used for sidecar filename) ────────────
      - name: Get Rust target triple
        id: triple
        shell: bash
        run: |
          TRIPLE=$(rustc --version --verbose | grep "^host:" | awk '{print $2}')
          echo "value=$TRIPLE" >> "$GITHUB_OUTPUT"

      # 7. Build Python sidecar ─────────────────────────────────────────────────
      - name: Build Python sidecar
        shell: bash
        working-directory: sidecar
        run: pyinstaller --onefile vagent_sidecar.py --name vagent_sidecar

      # 8. Install sidecar into src-tauri/binaries/ with Tauri naming convention
